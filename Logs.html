<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical Farm Logs | AgriFlow</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --accent: #0071e3;
            --accent-hover: #005bb5;
            --danger: #ff3b30;
            --border-color: rgba(0, 0, 0, 0.1);
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 30px; }

        /* Top Navigation & Hamburger Menu */
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color); position: relative; }
        .brand-header { display: flex; align-items: center; gap: 15px; }
        .brand-header svg { width: 36px; height: 36px; fill: var(--accent); }
        .header-titles h1 { margin: 0; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        .header-titles p { margin: 4px 0 0 0; font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

        .menu-container { position: relative; }
        .hamburger { cursor: pointer; padding: 5px; display: flex; align-items: center; }
        .hamburger svg { fill: var(--text-main); transition: fill 0.2s ease; }
        .hamburger:hover svg { fill: var(--accent); }

        .dropdown-menu { display: none; position: absolute; right: 0; top: 40px; background: #ffffff; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 12px; overflow: hidden; z-index: 100; min-width: 200px; border: 1px solid var(--border-color); }
        .dropdown-menu.active { display: block; }
        .dropdown-menu a { display: flex; align-items: center; gap: 12px; padding: 14px 20px; text-decoration: none; color: var(--text-main); font-size: 14px; font-weight: 500; border-bottom: 1px solid #f9f9f9; transition: background 0.2s ease, color 0.2s ease;}
        .dropdown-menu a svg { width: 18px; height: 18px; fill: var(--text-muted); transition: fill 0.2s ease;}
        .dropdown-menu a:hover { background: #f5f5f7; color: var(--accent); }
        .dropdown-menu a:hover svg { fill: var(--accent); }
        .dropdown-menu a:last-child { border-bottom: none; }

        /* Ledger UI */
        .card { background: var(--card-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 16px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid rgba(255, 255, 255, 0.5); }
        .controls-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; background: rgba(255, 255, 255, 0.5); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); }
        .date-filters { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .date-filters label { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
        .date-input { background: #ffffff; border: 1px solid var(--border-color); padding: 10px 15px; border-radius: 8px; outline: none; }
        .date-input:focus { border-color: var(--accent); }
        
        .btn-filter { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-export { background: #ffffff; color: var(--text-main); border: 1px solid var(--border-color); padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; }

        .table-wrapper { width: 100%; overflow-x: auto; max-height: 500px; overflow-y: auto; border-radius: 8px; border: 1px solid var(--border-color); background: #ffffff; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        thead { position: sticky; top: 0; background: #f9f9fb; z-index: 10; box-shadow: 0 1px 0 var(--border-color); }
        th { padding: 15px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 12px; }
        td { padding: 15px; border-bottom: 1px solid #f0f0f0; }
        
        .highlight-red { color: var(--danger); font-weight: 700; }
        .highlight-bold { font-weight: 600; color: var(--text-main); }
        #statusMessage { text-align: center; padding: 40px; color: var(--text-muted); font-style: italic; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="brand-header">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 22C12 22 20 18 20 11.5C20 8.5 17.5 6 14.5 6C13.2 6 12.1 6.5 11.3 7.3C10.5 6.5 9.4 6 8.1 6C5.1 6 2.6 8.5 2.6 11.5C2.6 18 10.6 22 10.6 22L12 22ZM12 4C14.2 4 16 2.2 16 0H14C14 1.1 13.1 2 12 2C10.9 2 10 1.1 10 0H8C8 2.2 9.8 4 12 4Z"/></svg>
            <div class="header-titles">
                <h1>Historical Farm Logs</h1>
                <p>Master Database Viewer</p>
            </div>
        </div>

        <div class="menu-container">
            <div class="hamburger" id="hamburgerBtn">
                <svg viewBox="0 0 24 24" width="28" height="28"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            </div>
            <div class="dropdown-menu" id="dropdownMenu">
                <a href="Agriflow.html">
                    <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
                    Daily Log Input
                </a>
                <a href="Logs.html">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                    Historical Ledger
                </a>
                <a href="Flowboard.html">
                    <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
                    Management BI
                </a>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="controls-bar">
            <div class="date-filters">
                <label>Start Date:</label>
                <input type="date" id="startDate" class="date-input">
                <label>End Date:</label>
                <input type="date" id="endDate" class="date-input">
                <button class="btn-filter" onclick="filterLogs()">Apply Filter</button>
                <button class="btn-filter" style="background: transparent; border: 1px solid var(--border-color); color: var(--text-main);" onclick="resetFilter()">Reset</button>
            </div>
            <button class="btn-export" onclick="exportToCSV()">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                Export
            </button>
        </div>

        <div id="statusMessage">Syncing Master Ledger...</div>

        <div class="table-wrapper" id="table-wrapper" style="display: none;">
            <table>
                <thead>
                    <tr>
                        <th>Date & Time</th>
                        <th>Location</th>
                        <th>Feed (Bags)</th>
                        <th>Mortalities</th>
                        <th>Eggs (Trays)</th>
                    </tr>
                </thead>
                <tbody id="auditTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Hamburger Menu Logic
        document.getElementById('hamburgerBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('dropdownMenu').classList.toggle('active');
        });
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.menu-container')) {
                document.getElementById('dropdownMenu').classList.remove('active');
            }
        });

        // HARDCODED API URL
        const API_URL = 'https://script.google.com/macros/s/AKfycby4_5u7incerK4D2SrF4GHMm0vw8A29aEVfIHUFvbHFr9bNfA-4yRNzNNAz4pCGqs8/exec';
        
        let globalMasterLogs = [];
        let currentlyDisplayedLogs = [];

        async function fetchAllLogs() {
            try {
                const response = await fetch(`${API_URL}?t=${new Date().getTime()}`);
                const result = await response.json();
                
                if (result.status === 'success') {
                    globalMasterLogs = result.data.reverse(); 
                    currentlyDisplayedLogs = [...globalMasterLogs];
                    document.getElementById('statusMessage').style.display = 'none';
                    document.getElementById('table-wrapper').style.display = 'block';
                    renderTable(currentlyDisplayedLogs);
                } else {
                    document.getElementById('statusMessage').innerHTML = "Database structure error: " + result.message;
                }
            } catch (error) {
                document.getElementById('statusMessage').innerHTML = "Error connecting to AgriFlow database.";
            }
        }

        function renderTable(dataArray) {
            const tableBody = document.getElementById('auditTableBody');
            tableBody.innerHTML = ''; 
            dataArray.forEach(row => {
                const tr = document.createElement('tr');
                const mortDisplay = parseInt(row.mortalities) > 0 ? `<span class="highlight-red">${row.mortalities}</span>` : row.mortalities;
                tr.innerHTML = `
                    <td style="color: var(--text-muted);">${row.timestamp}</td>
                    <td class="highlight-bold">${row.house}</td>
                    <td>${row.feed_bags}</td>
                    <td>${mortDisplay}</td>
                    <td class="highlight-bold">${row.egg_trays}</td>
                `;
                tableBody.appendChild(tr);
            });
        }

        function filterLogs() {
            const startVal = document.getElementById('startDate').value;
            const endVal = document.getElementById('endDate').value;
            if (!startVal && !endVal) return; 

            let startDate = startVal ? new Date(startVal) : new Date('2000-01-01');
            startDate.setHours(0, 0, 0, 0);
            let endDate = endVal ? new Date(endVal) : new Date('2100-01-01');
            endDate.setHours(23, 59, 59, 999);

            currentlyDisplayedLogs = globalMasterLogs.filter(row => {
                let rowDate = new Date(row.timestamp.split(',')[0]);
                return rowDate >= startDate && rowDate <= endDate;
            });
            renderTable(currentlyDisplayedLogs);
        }

        function resetFilter() {
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';
            currentlyDisplayedLogs = [...globalMasterLogs];
            renderTable(currentlyDisplayedLogs);
        }

        function exportToCSV() {
            let csvContent = "data:text/csv;charset=utf-8,Date & Time,Location,Feed Used (Bags),Mortalities,Eggs (Trays)\n";
            currentlyDisplayedLogs.forEach(row => {
                csvContent += `"${row.timestamp}","${row.house}","${row.feed_bags}","${row.mortalities}","${row.egg_trays}"\n`;
            });
            const link = document.createElement("a");
            link.setAttribute("href", encodeURI(csvContent));
            link.setAttribute("download", `AgriFlow_Export_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        window.onload = fetchAllLogs;
    </script>
</body>
</html>
