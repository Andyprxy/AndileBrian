<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriFlow - Live Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --success: #34c759;
            --warning: #ff9f0a;
            --danger: #ff3b30;
            --accent: #0071e3;
            --border-color: rgba(0, 0, 0, 0.1);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 30px; 
        }
        
        .dashboard-container { max-width: 1000px; margin: 0 auto; }

        /* Navigation */
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color); position: relative; }
        .brand-header { display: flex; align-items: center; gap: 15px; }
        .brand-header svg { width: 36px; height: 36px; fill: var(--accent); }
        .header-titles h1 { margin: 0; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        .header-titles p { margin: 4px 0 0 0; font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

        .menu-container { position: relative; }
        .hamburger { cursor: pointer; padding: 5px; display: flex; align-items: center; }
        .hamburger svg { fill: var(--text-main); transition: fill 0.2s ease; }
        .hamburger:hover svg { fill: var(--accent); }

        .dropdown-menu { display: none; position: absolute; right: 0; top: 40px; background: #ffffff; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 12px; overflow: hidden; z-index: 100; min-width: 200px; border: 1px solid var(--border-color); }
        .dropdown-menu.active { display: block; }
        .dropdown-menu a { display: flex; align-items: center; gap: 12px; padding: 14px 20px; text-decoration: none; color: var(--text-main); font-size: 14px; font-weight: 500; border-bottom: 1px solid #f9f9f9; transition: background 0.2s ease, color 0.2s ease;}
        .dropdown-menu a svg { width: 18px; height: 18px; fill: var(--text-muted); transition: fill 0.2s ease;}
        .dropdown-menu a:hover { background: #f5f5f7; color: var(--accent); }
        .dropdown-menu a:hover svg { fill: var(--accent); }

        /* KPI Cards */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: var(--card-bg); border-radius: 16px; padding: 24px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03); border: 1px solid #e5e5ea; transition: transform 0.2s ease; }
        .kpi-card:hover { transform: translateY(-2px); }
        .kpi-title { font-size: 14px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
        .kpi-value { font-size: 32px; font-weight: 700; margin: 0; }
        
        .loading-state { font-size: 16px; color: var(--text-muted); font-style: italic; }

        /* Chart Section */
        .chart-section { background: var(--card-bg); border-radius: 16px; padding: 24px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03); border: 1px solid #e5e5ea; }
        .chart-header { font-size: 18px; font-weight: 600; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;}
        .sync-status { font-size: 12px; color: var(--success); font-weight: 500; padding: 4px 10px; background: rgba(52, 199, 89, 0.1); border-radius: 12px;}
        
        /* Mobile Chart Wrapper */
        .chart-container {
            position: relative;
            height: 50vh; /* Scales dynamically based on screen height */
            min-height: 300px; /* Prevents it from getting too squished on small phones */
            width: 100%;
        }

        /* Mobile Adjustments (Phones) */
        @media (max-width: 600px) {
            body { padding: 15px; } /* Reduce padding on small screens */
            .header-titles h1 { font-size: 20px; }
            .kpi-grid { grid-template-columns: 1fr; gap: 15px; } /* Stack cards completely */
            .kpi-card { padding: 20px; }
            .chart-section { padding: 15px; }
            
            /* Stack header elements if they get cramped */
            .chart-header { flex-direction: column; align-items: flex-start; gap: 10px; font-size: 16px; }
            .sync-status { align-self: flex-start; }
            
            /* Give chart more vertical breathing room on mobile */
            .chart-container { min-height: 350px; }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="top-nav">
            <div class="brand-header">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 22C12 22 20 18 20 11.5C20 8.5 17.5 6 14.5 6C13.2 6 12.1 6.5 11.3 7.3C10.5 6.5 9.4 6 8.1 6C5.1 6 2.6 8.5 2.6 11.5C2.6 18 10.6 22 10.6 22L12 22ZM12 4C14.2 4 16 2.2 16 0H14C14 1.1 13.1 2 12 2C10.9 2 10 1.1 10 0H8C8 2.2 9.8 4 12 4Z"/></svg>
                <div class="header-titles">
                    <h1>Management Dashboard</h1>
                    <p>Live Production Metrics - House A</p>
                </div>
            </div>

            <div class="menu-container">
                <div class="hamburger" id="hamburgerBtn">
                    <svg viewBox="0 0 24 24" width="28" height="28"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
                </div>
                <div class="dropdown-menu" id="dropdownMenu">
                    <a href="Agriflow.html"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>Daily Log Input</a>
                    <a href="Logs.html"><svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>Historical Ledger</a>
                    <a href="Flowboard.html"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>Management BI</a>
                </div>
            </div>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-title">Current Feed Inventory</div>
                <p class="kpi-value" id="kpi-feed"><span class="loading-state">Syncing...</span></p>
            </div>
            <div class="kpi-card">
                <div class="kpi-title">Latest Daily Eggs</div>
                <p class="kpi-value" id="kpi-eggs"><span class="loading-state">Syncing...</span></p>
            </div>
            <div class="kpi-card">
                <div class="kpi-title">Total Mortality Rate</div>
                <p class="kpi-value" id="kpi-mortality" style="color: var(--danger);"><span class="loading-state">Syncing...</span></p>
            </div>
        </div>

        <div class="chart-section">
            <div class="chart-header">
                Production vs. Consumption Trend
                <span class="sync-status" id="syncStatus">Fetching Data...</span>
            </div>
            <div class="chart-container">
                <canvas id="yieldChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Hamburger Menu Logic
        document.getElementById('hamburgerBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('dropdownMenu').classList.toggle('active');
        });
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.menu-container')) {
                document.getElementById('dropdownMenu').classList.remove('active');
            }
        });

        // YOUR LIVE API URL
        const API_URL = 'https://script.google.com/macros/s/AKfycbxWVj3aa3pAvaIsUBBqIQRhk4cBK4F5o231dgpuIYK7MsGwtrVfncNA-mkiTMsjRQ/exec';

        // Variables for our Chart
        let agriChart;

        async function fetchDashboardData() {
            try {
                const response = await fetch(`${API_URL}?t=${new Date().getTime()}`);
                const result = await response.json();
                
                if (result.status === 'success') {
                    processData(result.data);
                    document.getElementById('syncStatus').innerText = "Live Synced";
                } else {
                    document.getElementById('syncStatus').innerText = "Sync Error";
                    document.getElementById('syncStatus').style.color = "var(--danger)";
                }
            } catch (error) {
                console.error("Fetch error:", error);
                document.getElementById('syncStatus').innerText = "Connection Failed";
            }
        }

        function processData(data) {
            data.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

            let totalFeedUsed = 0;
            let totalMortalities = 0;
            let latestEggs = 0;
            
            const dailyData = {};

            data.forEach(row => {
                const feed = parseInt(row.feed_bags) || 0;
                const eggs = parseInt(row.egg_trays) || 0;
                const dead = parseInt(row.mortalities) || 0;

                const dateStr = new Date(row.timestamp).toLocaleDateString([], { month: 'short', day: 'numeric' });

                if (!dailyData[dateStr]) {
                    dailyData[dateStr] = { feed: 0, eggs: 0, mortalities: 0 };
                }

                dailyData[dateStr].feed += feed;
                dailyData[dateStr].eggs += eggs;
                dailyData[dateStr].mortalities += dead;

                totalFeedUsed += feed;
                totalMortalities += dead;
                latestEggs = eggs; 
            });

            const STARTING_FEED_INVENTORY = 500; 
            const STARTING_FLOCK_SIZE = 5000;    

            const currentFeed = STARTING_FEED_INVENTORY - totalFeedUsed;
            const mortalityRate = ((totalMortalities / STARTING_FLOCK_SIZE) * 100).toFixed(2);

            document.getElementById('kpi-feed').innerText = `${currentFeed} Bags`;
            document.getElementById('kpi-eggs').innerText = `${latestEggs} Trays`;
            document.getElementById('kpi-mortality').innerText = `${mortalityRate}%`;

            const labels = Object.keys(dailyData);
            const eggData = labels.map(date => dailyData[date].eggs);
            const feedData = labels.map(date => dailyData[date].feed);
            const mortData = labels.map(date => dailyData[date].mortalities);

            renderChart(labels, eggData, feedData, mortData);
        }

        function renderChart(labels, eggData, feedData, mortData) {
            const ctx = document.getElementById('yieldChart').getContext('2d');
            
            if (agriChart) { agriChart.destroy(); }

            agriChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Eggs Collected',
                            data: eggData,
                            borderColor: '#0071e3',
                            backgroundColor: 'rgba(0, 113, 227, 0.1)',
                            borderWidth: 3,
                            tension: 0.4,
                            fill: true,
                            yAxisID: 'y'
                        },
                        {
                            label: 'Feed Used',
                            data: feedData,
                            borderColor: '#ff9f0a',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            tension: 0.4,
                            fill: false,
                            yAxisID: 'y1'
                        },
                        {
                            label: 'Mortalities',
                            type: 'bar', 
                            data: mortData,
                            backgroundColor: 'rgba(255, 59, 48, 0.7)',
                            yAxisID: 'y2'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false, // CRITICAL FOR MOBILE: Allows the height wrapper to take control
                    interaction: { mode: 'index', intersect: false },
                    plugins: { 
                        legend: { 
                            position: 'top',
                            labels: {
                                boxWidth: 12, // Slightly smaller legend boxes for mobile
                                font: { size: 11 }
                            }
                        } 
                    },
                    scales: {
                        y: { type: 'linear', display: true, position: 'left', title: { display: true, text: 'Eggs' } },
                        y1: { type: 'linear', display: true, position: 'right', title: { display: true, text: 'Feed' }, grid: { drawOnChartArea: false } },
                        y2: { type: 'linear', display: false, position: 'right', min: 0, suggestedMax: 20 }
                    }
                }
            });
        }

        window.onload = fetchDashboardData;
    </script>
</body>
</html>
